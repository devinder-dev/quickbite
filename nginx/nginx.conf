events {}
http {
  # Reverse proxy / load balancer in front of the gateway.
  # Add more gateway replicas here to load-balance round-robin.
  upstream gateway_upstream {
    server gateway:3000;
  }

  server {
    listen 80;
    location / {
      proxy_pass http://gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
