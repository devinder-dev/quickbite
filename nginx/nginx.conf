events {}
http {
  # Reverse proxy / load balancer in front of the gateway.
  # Add more gateway replicas here to load-balance round-robin.
  upstream gateway_upstream {
    server gateway:3000;
  }

  upstream frontend_upstream {
    server frontend:3005;
  }

  server {
    listen 80;

    location = /health {
      proxy_pass http://gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # NO trailing slash on proxy_pass here — the gateway's own proxy code
    # (services/gateway/src/index.ts) does req.url.slice("/api/menu".length)
    # and expects to receive the full /api/... path unchanged. Adding a
    # trailing slash to "http://gateway_upstream/" would strip this prefix
    # before forwarding and break that.
    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else (the React app and its client-side routes) goes to
    # the frontend container.
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
