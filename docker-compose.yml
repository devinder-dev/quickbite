services:
  # No published ports below except nginx — nginx is the system's only
  # public entry point. RabbitMQ/Postgres/Redis/the gateway are reachable
  # only from other containers on the internal Docker network, by service
  # name. For local debugging access to these, use docker-compose.dev.yml.
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quickbite
      POSTGRES_PASSWORD: quickbite
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickbite"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: { context: ., dockerfile: services/gateway/Dockerfile }
    environment:
      PORT: 3000
      MENU_URL: http://menu:3001
      ORDER_URL: http://order:3002
    depends_on: [menu, order]

  menu:
    build: { context: ., dockerfile: services/menu/Dockerfile }
    environment:
      PORT: 3001
      DATABASE_URL: postgres://quickbite:quickbite@postgres:5432/menu_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  order:
    build: { context: ., dockerfile: services/order/Dockerfile }
    environment:
      PORT: 3002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://quickbite:quickbite@postgres:5432/order_db
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  kitchen:
    build: { context: ., dockerfile: services/kitchen/Dockerfile }
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://quickbite:quickbite@postgres:5432/kitchen_db
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  notification:
    build: { context: ., dockerfile: services/notification/Dockerfile }
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://quickbite:quickbite@postgres:5432/notification_db
      REDIS_URL: redis://redis:6379
    depends_on:
      rabbitmq: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # The system's single public entry point — every other service above is
  # unreachable from outside the Docker network.
  nginx:
    image: nginx:alpine
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["80:80"]
    depends_on: [gateway]

volumes:
  pgdata:
